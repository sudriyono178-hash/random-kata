<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Random Kosakata</title>

    <link rel="manifest" href="manifest.json">

    <link rel="icon" type="image/png" href="icon-192.png">

    <link rel="apple-touch-icon" href="icon-192.png">

    <meta name="theme-color" content="#1976d2">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="navbar">

    <div class="logo">

        <img src="icon-192.png" alt="logo">

        <span>RANDOM KOSAKATA</span>

    </div>

    <div class="menu-kanan">

        <button id="btnLogin" class="btn-google">
            Masuk Google
        </button>

        <div id="userBox" class="hidden">

            <img id="fotoUser">

            <span id="namaUser"></span>

            <button id="logoutBtn">
                Keluar
            </button>

        </div>

    </div>

</header>



<main id="home">

<section class="hero">

<h1>Random Kosakata</h1>

<p>
Belajar kosakata Mandarin lebih mudah dan menyenangkan.
</p>

<div class="menuHome">

<button id="mulaiBelajar">

📚 Mulai Belajar

</button>

<button id="kelolaBab">

📂 Kelola Bab

</button>

<button id="lihatProgress">

📊 Progress

</button>

<button id="sinkron">

☁ Simpan ke Cloud

</button>

</div>

</section>

</main>



<section id="halamanBab" class="hidden">

<h2>Daftar Bab</h2>

<div class="tambahBab">

<input
type="text"
id="inputBab"
placeholder="Nama Bab">

<button id="btnTambahBab">

Tambah Bab

</button>

</div>



<div id="daftarBab">

</div>



<button id="kembaliHome">

← Kembali

</button>

</section>
  
<section id="halamanBelajar" class="hidden">

    <div class="belajar-header">

        <button id="btnKembaliBab" class="btn-secondary">
            ← Kembali
        </button>

        <h2 id="judulBab">
            Nama Bab
        </h2>

    </div>

    <div class="kartu-soal">

        <div id="kataChina" class="kata-china">
            你好
        </div>

        <div id="artiIndonesia" class="arti hidden">
            Halo
        </div>

        <button id="btnLihatArti" class="btn-biru">
            Lihat Arti
        </button>

    </div>

    <div class="aksi-belajar">

        <button id="btnBenar" class="btn-hijau">
            ✅ Benar
        </button>

        <button id="btnSalah" class="btn-merah">
            ❌ Salah
        </button>

    </div>

    <hr>

    <h3>Daftar Kosakata</h3>

    <div id="daftarKata"></div>

    <div class="formTambah">

        <input
            type="text"
            id="inputChina"
            placeholder="汉字">

        <input
            type="text"
            id="inputPinyin"
            placeholder="Pinyin">

        <input
            type="text"
            id="inputArti"
            placeholder="Arti Indonesia">

        <button id="btnTambahKata" class="btn-biru">
            Tambah Kata
        </button>

    </div>

</section>
