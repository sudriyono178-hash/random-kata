<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Random Kata</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#d32f2f">
<style>

*{

box-sizing:border-box;

font-family:Arial,sans-serif;

}

body{

margin:0;

padding:15px;

background:#ffffff;

color:#222;

}

h1,h2{

text-align:center;

}

.card{

background:#f5f5f5;

border:1px solid #ddd;

border-radius:12px;

padding:12px;

margin-bottom:12px;

}

input{

width:100%;

padding:12px;

margin-bottom:10px;

border:1px solid #ccc;

border-radius:8px;

font-size:16px;

}

button{

background:#d32f2f;

color:white;

border:none;

padding:10px 14px;

border-radius:8px;

cursor:pointer;

margin:3px;

}

.hidden{

display:none;

}

.row{

display:flex;

justify-content:space-between;

align-items:center;

gap:10px;

padding:10px;

border-bottom:1px solid #ddd;

}

.kata{

font-weight:bold;

font-size:18px;

}

.small{

font-size:12px;

color:#666;

}

.center{

text-align:center;

}

#hasil{

margin-top:20px;

padding:15px;

background:#f5f5f5;

border-radius:12px;

text-align:center;

font-size:22px;

}

</style>

</head>

<body>



<div id="home">

<h1>

Random Kata

</h1>



<div class="card">

<input

id="inputBab"

placeholder="Nama Bab"

>



<button

onclick="tambahBab()"

>

Tambah Bab

</button>



</div>



<div id="listBab">

</div>



</div>





<div

id="halamanBab"

class="hidden"

>



<button

onclick="kembali()"

>

Kembali

</button>



<h2

id="judulBab"

>

</h2>





<div class="card">



<input

id="inputKata"

placeholder="Kosakata"

>



<input

id="inputArti"

placeholder="Arti Indonesia"

>



<button

onclick="tambahKata()"

>

Tambah Kata

</button>



</div>





<div

id="editForm"

class="card hidden"

>



<h3>

Edit Kosakata

</h3>



<input

id="editKata"

placeholder="Kosakata"

>



<input

id="editArti"

placeholder="Arti"

>



<button

onclick="simpanEdit()"

>

Simpan Edit

</button>



<button

onclick="batalEdit()"

>

Batal

</button>



</div>





<div class="card">



<input

id="cariKata"

placeholder="Cari kosakata..."

onkeyup="tampilkanKata()"

>



</div>





<div class="card">



<div class="row">

<b>

Kosakata

</b>

<b>

Arti

</b>

</div>



<div

id="listKata"

>

</div>



</div>





<div class="center">

<button

onclick="acakKata()"

>

Acak Kata

</button>

</div>



<div id="hasil">

</div>



</div>



<script>

let data=

JSON.parse(

localStorage.getItem(

"randomKata"

)

)||{};



let babAktif="";

let editIndex=-1;

let timer=null;

let sudahKeluar=[];



function simpan(){

localStorage.setItem(

"randomKata",

JSON.stringify(data)

);

}function tampilkanBab(){

let html="";

for(let bab in data){

html+=`

<div class="card">

<b>

${bab}

</b>

<br>

<span class="small">

Jumlah kata :

${data[bab].length}

</span>

<br><br>

<button

onclick="bukaBab('${bab}')"

>

Buka

</button>

<button

onclick="hapusBab('${bab}')"

>

Hapus

</button>

</div>

`;

}

document

.getElementById("listBab")

.innerHTML=html;

}



function tambahBab(){

let nama=

document

.getElementById("inputBab")

.value

.trim();



if(!nama)

return;



if(data[nama]){

alert(

"Bab sudah ada"

);

return;

}



data[nama]=[];



simpan();

tampilkanBab();



document

.getElementById("inputBab")

.value="";

}



function hapusBab(nama){

if(

confirm(

"Hapus bab ini?"

)

){

delete data[nama];



simpan();

tampilkanBab();

}

}



function bukaBab(nama){

babAktif=nama;

sudahKeluar=[];



document

.getElementById("home")

.classList

.add("hidden");



document

.getElementById("halamanBab")

.classList

.remove("hidden");



document

.getElementById("judulBab")

.innerText=nama;



document

.getElementById("hasil")

.innerHTML="";



tampilkanKata();



document

.getElementById("inputKata")

.focus();

}



function kembali(){

document

.getElementById("halamanBab")

.classList

.add("hidden");



document

.getElementById("home")

.classList

.remove("hidden");



document

.getElementById("hasil")

.innerHTML="";

}



function tambahKata(){

let kata=

document

.getElementById("inputKata")

.value

.trim();



let arti=

document

.getElementById("inputArti")

.value

.trim();



if(

!kata ||

!arti

)

return;



if(

data[babAktif]

.some(

item=>

item.kata

.toLowerCase()

===

kata

.toLowerCase()

)

){

alert(

"Kata sudah ada"

);

return;

}



data[babAktif]

.push({

kata:kata,

arti:arti

});



simpan();

tampilkanKata();



document

.getElementById("inputKata")

.value="";



document

.getElementById("inputArti")

.value="";



document

.getElementById("inputKata")

.focus();

}function tampilkanKata(){

let cari=

document

.getElementById("cariKata")

.value

.toLowerCase();



let html="";



data[babAktif]

.forEach((item,index)=>{



if(

item.kata

.toLowerCase()

.includes(cari)

||

item.arti

.toLowerCase()

.includes(cari)

){



html+=`

<div class="row">

<div>

<div class="kata">

${item.kata}

</div>

<div>

${item.arti}

</div>

</div>



<div>

<button

onclick="editKata(${index})"

>

Edit

</button>



<button

onclick="hapusKata(${index})"

>

Hapus

</button>

</div>

</div>

`;



}



});



document

.getElementById("listKata")

.innerHTML=html;

}



function editKata(index){

editIndex=index;



document

.getElementById("editForm")

.classList

.remove("hidden");



document

.getElementById("editKata")

.value=

data[babAktif]

[index]

.kata;



document

.getElementById("editArti")

.value=

data[babAktif]

[index]

.arti;

}



function simpanEdit(){



let kata=

document

.getElementById("editKata")

.value

.trim();



let arti=

document

.getElementById("editArti")

.value

.trim();



if(

!kata||

!arti

){

alert(

"Isi semua"

);

return;

}



data[babAktif]

[editIndex]

={

kata:kata,

arti:arti

};



simpan();



tampilkanKata();



batalEdit();

}



function batalEdit(){



editIndex=-1;



document

.getElementById("editForm")

.classList

.add("hidden");



}



function hapusKata(index){



if(

confirm(

"Hapus kata ini?"

)

){



data[babAktif]

.splice(index,1);



simpan();



tampilkanKata();



}



}



function acakKata(){



if(

data[babAktif]

.length===0

){



document

.getElementById("hasil")

.innerHTML=



"Belum ada kosakata";



return;



}



if(



sudahKeluar

.length



===



data[babAktif]

.length



){



document

.getElementById("hasil")

.innerHTML=`

6

<b>

Semua kata sudah keluar

</b>



<br><br>



<button

onclick="mulaiLagi()"

>

Mulai Lagi

</button>

`;



return;



}



if(timer){

clearInterval(timer);

}



let index;



do{



index=



Math.floor(



Math.random()



*



data[babAktif]

.length



);



}



while(



sudahKeluar

.includes(index)



);



sudahKeluar

.push(index);



let item=



data[babAktif]

[index];



let hitung=3;



document

.getElementById("hasil")

.innerHTML=`



<b style="font-size:32px">

${item.kata}

</b>



<br><br>



arti muncul dalam



<br><br>



<span

id="countdown"

style="font-size:42px"

>

3

</span>



`;



timer=



setInterval(()=>{



hitung--;



if(

hitung>0

){



document

.getElementById(

"countdown"

)

.innerText

=

hitung;



}else{



clearInterval(

timer

);



document

.getElementById("hasil")

.innerHTML=`



<b style="font-size:32px">

${item.kata}

</b>



<br><br>



${item.arti}



`;



}



},1000);



}



function mulaiLagi(){



sudahKeluar=[];



document

.getElementById("hasil")

.innerHTML="";



acakKata();



}



tampilkanBab();



</script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js")
    .then(() => console.log("Service Worker berhasil"))
    .catch(err => console.log(err));
}
</script>
</body>

</html>
